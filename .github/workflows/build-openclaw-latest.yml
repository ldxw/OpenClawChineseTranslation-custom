name: 自动构建 OpenClaw 自定义镜像 多版本镜像

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "强制重新构建（忽略 digest 跳过逻辑）"
        required: false
        default: false
        type: boolean

jobs:
  prepare:
    name: 检测上游镜像是否更新
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      date: ${{ steps.date.outputs.value }}
      digest: ${{ steps.upstream.outputs.digest }}
      cache_hit: ${{ steps.digest-cache.outputs.cache-hit }}

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 生成日期标签
        id: date
        run: echo "value=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: 获取上游镜像摘要
        id: upstream
        run: |
          docker buildx imagetools inspect ghcr.io/1186258278/openclaw-zh:latest \
            --format '{{json .Manifest.Digest}}' | tr -d '"' > upstream_digest.txt
          echo "digest=$(cat upstream_digest.txt)" >> $GITHUB_OUTPUT

      - name: 恢复摘要缓存
        id: digest-cache
        uses: actions/cache@v4
        with:
          path: .digest-cache
          key: upstream-${{ steps.upstream.outputs.digest }}

      - name: 保存最新摘要标记
        run: |
          mkdir -p .digest-cache
          echo "${{ steps.upstream.outputs.digest }}" > .digest-cache/digest.txt

  build:
    name: 构建并推送 ${{ matrix.suffix }} 版本
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.cache_hit != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_rebuild == true)

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile.low
            suffix: low
            push_latest: "false"

          - dockerfile: Dockerfile.standard
            suffix: standard
            push_latest: "true"

          - dockerfile: Dockerfile.full
            suffix: full
            push_latest: "false"

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 登录阿里云镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: 生成镜像标签
        id: tags
        run: |
          GHCR_TAGS="ghcr.io/${{ github.repository_owner }}/openclaw-zh-custom:${{ matrix.suffix }}
          ghcr.io/${{ github.repository_owner }}/openclaw-zh-custom:${{ matrix.suffix }}-${{ needs.prepare.outputs.date }}"
          
          ALIYUN_TAGS="${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/openclaw-zh-custom:${{ matrix.suffix }}
          ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/openclaw-zh-custom:${{ matrix.suffix }}-${{ needs.prepare.outputs.date }}"

          if [ "${{ matrix.push_latest }}" = "true" ]; then
            GHCR_TAGS="$GHCR_TAGS
          ghcr.io/${{ github.repository_owner }}/openclaw-zh-custom:latest
          ghcr.io/${{ github.repository_owner }}/openclaw-zh-custom:${{ needs.prepare.outputs.date }}"
            ALIYUN_TAGS="$ALIYUN_TAGS
          ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/openclaw-zh-custom:latest
          ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/openclaw-zh-custom:${{ needs.prepare.outputs.date }}"
          fi

          {
            echo "value<<EOF"
            echo "$GHCR_TAGS"
            echo "$ALIYUN_TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 构建并推送多架构镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          no-cache: ${{ github.event_name == 'workflow_dispatch' && inputs.force_rebuild == true }}
          tags: ${{ steps.tags.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}

  result:
    name: 输出结果
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    if: always()

    steps:
      - name: 输出结果
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_rebuild }}" = "true" ]; then
            echo "已执行强制重构，并推送 low / standard / full 到 GHCR 与阿里云镜像仓库。"
          elif [ "${{ needs.prepare.outputs.cache_hit }}" = "true" ]; then
            echo "上游镜像没有更新，本次跳过构建。"
          else
            echo "检测到上游镜像更新，已完成 low / standard / full 多架构构建并推送到 GHCR 与阿里云镜像仓库。"
          fi
