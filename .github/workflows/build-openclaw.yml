name: 自动构建 OpenClaw 自定义镜像 默认镜像

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    name: 检测上游更新并构建多架构镜像
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 获取上游镜像摘要
        id: upstream
        run: |
          docker buildx imagetools inspect ghcr.io/1186258278/openclaw-zh:latest \
            --format '{{json .Manifest.Digest}}' | tr -d '"' > upstream_digest.txt
          echo "digest=$(cat upstream_digest.txt)" >> $GITHUB_OUTPUT

      - name: 恢复摘要缓存
        id: digest-cache
        uses: actions/cache@v4
        with:
          path: .digest-cache
          key: upstream-${{ steps.upstream.outputs.digest }}

      - name: 保存最新摘要标记
        run: |
          mkdir -p .digest-cache
          echo "${{ steps.upstream.outputs.digest }}" > .digest-cache/digest.txt

      - name: 构建并推送多架构镜像
        if: steps.digest-cache.outputs.cache-hit != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/openclaw-zh-custom:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 输出结果
        run: |
          if [ "${{ steps.digest-cache.outputs.cache-hit }}" = "true" ]; then
            echo "上游镜像没有更新，本次跳过构建。"
          else
            echo "检测到上游镜像更新，已完成多架构构建并推送。"
          fi
